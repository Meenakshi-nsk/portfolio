<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Meenakshi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">Meenakshi NM</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Me</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-banner">
        <div class="container">
            <h2>Contact Me</h2>
            <p>You can use the form below to send your details.</p>
        </div>
    </section>

    <section class="section">
        <div class="container form-box">
            <form>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">

                <label for="course">Course</label>
                <input type="text" id="course" name="course" placeholder="Enter your course">

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Write your message"></textarea>

                <input type="submit" value="Submit" class="btn submit-btn">
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Meenakshi NM. All Rights Reserved.</p>
            <p>
                <a href="index.html">Home</a> |
                <a href="about.html">About</a> |
                <a href="projects.html">Projects</a>
            </p>
        </div>
    </footer>

</body>
</html>
